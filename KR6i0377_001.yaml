body:
  text: 失譯人名今附西晉録佛問諸沙門親之生子懷之十月身為重病臨生之日母危父怖其情難言既生之後推燥臥濕精誠之至血化為乳摩拭澡浴衣食教詔禮賂師友奉貢君長子顏和悅親亦欣豫子設慘戚親心焦枯出門愛念入則存之心懷惕惕懼其不善親恩若此何以報之諸沙門對曰唯當盡禮慈心供養以賽親恩世尊又曰子之養親甘露百味以恣其口天樂衆音以娛其耳名衣上服光耀其身兩肩荷負周流四海訖子年命以賽養恩可謂孝乎諸沙門曰惟孝之大莫尚乎茲世尊告曰未為孝矣若親頑暗不奉三尊凶虐殘戾濫竊非理淫姪外色偽辭非道鴆愐荒亂違背正真凶孽若斯子當極諫以啓悟之若猶瞢瞢未悟即為義化當牽譬引類示王者之牢獄諸囚之刑戮曰斯為不軌身被衆毒自招殞命命終神去繫于太山湯火萬毒獨呼無救由彼履惡遭斯重殃矣設復未移吟泣啼嗷絶不飲食親雖不明必以恩愛之痛懼子死矣猶當強忍伏心崇道若親遷志奉佛五戒仁惻不殺清讓不盜貞潔不淫守信不欺孝順不醉者宗門之內即親慈子孝夫正婦貞九族和睦僕使順從潤澤遠被含血受恩十方諸佛天龍鬼神有道之君忠平之臣黎庶萬姓無不敬愛祐而安之數有顛倒之政嬖之輔凶兒妖婦千邪萬怪無如已何於是二親處世常安壽終魂靈往生天上諸佛共會得聞法言獲道度世長與苦別佛告諸沙門覩世無孝唯斯為孝耳能令親去惡為善奉持五戒執三自歸朝奉而暮終者恩重於親乳哺之養無量之惠若不能以三尊之至化其親者雖為孝養猶為不孝無以𭒯妻遠賢不親女情多欲好色無倦違孝殺親國政荒亂萬民流亡本志惠施禮式自撿軟心崇仁蒸蒸進德潛意寂寞學志睿達名動諸天明齊賢者自穢妻聚惑志女色荒迷于欲妖蠱姿態其變萬端薄智之夫淺見之士覩其如此不覺微漸遂回志沒身從彼魃魅邪巧之亂或危親殺君吝色情蕩忿嫉怠慢散心盲冥等行鳥獸自古世來無不由之殺身滅宗是以沙門獨而不雙清潔其志以道是務奉斯明戒為君即保四海為臣即忠以仁養民即父法明子孝慈夫信婦貞優婆塞優婆夷執行如是世世逢佛見法得道佛説如是弟子歡喜
